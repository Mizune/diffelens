# AI PR Review Configuration
# Place this file at the repository root

version: "1.0"

global:
  max_rounds: 4
  language: "en"
  default_cli: "gemini"    # "claude", "codex", or "gemini"
  timeout_ms: 120000       # 2 minutes
  # base_url: "https://proxy.example.com"  # API proxy for all lenses

lenses:
  readability:
    enabled: true
    cli: "gemini"
    model: "gemini-2.5-flash"
    isolation: "tempdir"     # diff only (no repository exploration)
    tool_policy: "none"      # no tools
    timeout_ms: 300000       # 5 minutes
    severity_cap: "warning"  # readability never produces blockers

  architectural:
    enabled: true
    cli: "gemini"
    model: "gemini-2.5-flash"
    isolation: "repo"        # runs in repository (exploration enabled)
    tool_policy: "all"       # all tools available
    timeout_ms: 600000       # 10 minutes
    severity_cap: "blocker"

  bug_risk:
    enabled: true
    cli: "gemini"
    model: "gemini-2.5-flash"
    isolation: "repo"
    tool_policy: "all"       # all tools available
    timeout_ms: 600000       # 10 minutes
    severity_cap: "blocker"

filters:
  exclude_patterns:
    - "**/*.generated.*"
    - "**/*.g.dart"
    - "**/build/**"
    - "**/dist/**"
    - "**/*.min.js"
    - "**/*.lock"
    - "**/node_modules/**"

convergence:
  round_severities:
    - ["blocker", "warning", "nitpick"]   # round 1: all
    - ["blocker", "warning", "nitpick"]   # round 2: all
    - ["blocker", "warning"]              # round 3: drop nitpick
    - ["blocker"]                         # round 4: blocker only
  approve_condition: "zero_blockers"

output:
  github:
    auto_approve: true
    on_issues: "request_changes"
    inline_comments: true
    max_inline_comments: 25
    inline_severities: ["blocker", "warning"]
