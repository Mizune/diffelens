# Gemini-based AI PR Review Configuration
# Uses Gemini CLI with gemini-2.5-flash for all lenses

version: "1.0"

global:
  max_rounds: 2
  default_cli: "gemini"
  timeout_ms: 120000

lenses:
  readability:
    enabled: true
    cli: "gemini"
    model: "gemini-2.5-flash"
    isolation: "tempdir"
    tool_policy: "none"
    timeout_ms: 300000
    severity_cap: "warning"

  bug_risk:
    enabled: true
    cli: "gemini"
    model: "gemini-2.5-flash"
    isolation: "tempdir"
    tool_policy: "none"
    timeout_ms: 300000
    severity_cap: "blocker"

filters:
  exclude_patterns:
    - "**/*.generated.*"
    - "**/build/**"
    - "**/dist/**"
    - "**/*.min.js"
    - "**/*.lock"
    - "**/node_modules/**"

convergence:
  round_severities:
    - ["blocker", "warning", "nitpick"]
    - ["blocker"]
  approve_condition: "zero_blockers"
